name: "Nix Build and Test"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run Fast Checks
        run: |
          nix build -L \
            .#checks.x86_64-linux.lint-deadnix \
            .#checks.x86_64-linux.lint-statix \
            .#checks.x86_64-linux.lint-formatting \
            .#checks.x86_64-linux.lint-shebang \
            .#checks.x86_64-linux.lint-shellcheck \
            .#checks.x86_64-linux.lint-machete \
            .#checks.x86_64-linux.lint-clippy

  checks:
    name: Check ${{ matrix.check }}
    needs: fast-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - repx-py-tests
          - rs-client-tests
          - rs-unit
          - rs-bwrap
          - rs-gc
          - rs-integration
          - rs-containers
          - rs-executor
          - lib-integration
          - lib-invalidation
          - lib-pipeline-logic
          - lib-dynamic-params-validation
          - lib-parameters
          - lib-parameters-types
          - e2e-local
          - e2e-remote-local
          - e2e-remote-slurm
          - static-analysis
          - non-nixos-standalone
          - non-nixos-remote
          - lib-deps-fail-missing
          - lib-deps-pass-complex
          - lib-deps-pass-valid
          - e2e-impure
          - e2e-mount-paths
          - e2e-impure-podman
          - e2e-mount-paths-podman
          - e2e-impure-docker
          - e2e-mount-paths-docker
          - incremental-sync
          - lib-large-lab
          - lib-buildcommand-size
          - lib-stage-env-size
          - lib-resource-hints
          - lib-zip-params
          - lib-non-scalar-params
          - e2e-bwrap-overlay-fallback
          - e2e-gc-local
          - e2e-gc-remote
          - e2e-scatter-gather-cancel
          - e2e-init
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run E2E Check
        run: nix build -L .#checks.x86_64-linux.${{ matrix.check }}

  example-checks:
    name: Example Checks
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run Example Checks
        run: nix run -L .#check-repx-examples
